[pytest]
testpaths = smoketest
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -ra -q -m "not slow"
markers =
    slow: expensive tests that re-run the engine (e.g. the physical-testing acceptance oracle). Deselected by DEFAULT (see addopts): a bare `pytest` must stay fast and hermetic, since the acceptance oracle's cold run takes hours and spawns a worker pool. Run it explicitly with `pytest -m slow`, or via the real gate, `python scripts/phystest check`.
